# ServiceAccount and RBAC for PAC-triggered release pipelines.
# The wait-for-chains task needs to list/get TaskRuns to check
# Tekton Chains signing status on publish-images tasks.

# --- releases-operator ---
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: release
  namespace: releases-operator
secrets:
- name: ghcr-chains-auth
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: release-chain-watcher
  namespace: releases-operator
rules:
- apiGroups: ["tekton.dev"]
  resources: ["taskruns"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: release-chain-watcher
  namespace: releases-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: release-chain-watcher
subjects:
- kind: ServiceAccount
  name: release
  namespace: releases-operator

