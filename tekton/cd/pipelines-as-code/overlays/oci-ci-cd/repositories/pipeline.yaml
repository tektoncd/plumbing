# Repository CR for tektoncd/pipeline.
# PAC matches incoming events (push, incoming webhook) to PipelineRuns
# defined in the repository's .tekton/ directory.
# PipelineRuns are executed in the releases-pipeline namespace.
---
apiVersion: v1
kind: Namespace
metadata:
  name: releases-pipeline
---
apiVersion: "pipelinesascode.tekton.dev/v1alpha1"
kind: Repository
metadata:
  name: tektoncd-pipeline
  namespace: releases-pipeline
spec:
  url: "https://github.com/tektoncd/pipeline"
  settings:
    # Fetch .tekton/ from the default branch (main), not from the PR branch.
    # This prevents PR authors from modifying release pipelines — only merged
    # changes to main take effect.
    pipelinerun_provenance: "default_branch"
    policy:
      # Only pipeline maintainers and plumbing maintainers can approve
      # external PRs with /ok-to-test
      ok_to_test:
        - core-maintainers
        - plumbing-maintainers
      # Only pipeline maintainers can trigger CI on their own PRs
      pull_request:
        - core-maintainers
  incoming:
    - targets:
        - "release-v*"
      secret:
        name: pac-incoming-secret
      type: webhook-url
      params:
        - version
        - release_as_latest
