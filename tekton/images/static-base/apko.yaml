contents:
  keyring:
    # One signing key per target architecture (Alpine signs each arch's
    # APKINDEX with a different key). All four are required so the build is
    # reproducible in a clean CI environment.
    - https://alpinelinux.org/keys/alpine-devel@lists.alpinelinux.org-6165ee59.rsa.pub  # x86_64
    - https://alpinelinux.org/keys/alpine-devel@lists.alpinelinux.org-616ae350.rsa.pub  # aarch64
    - https://alpinelinux.org/keys/alpine-devel@lists.alpinelinux.org-616ac3bc.rsa.pub  # s390x
    - https://alpinelinux.org/keys/alpine-devel@lists.alpinelinux.org-58cbb476.rsa.pub  # ppc64le
  repositories:
    - https://dl-cdn.alpinelinux.org/alpine/v3.21/main
  packages:
    - ca-certificates-bundle
    - tzdata
    - alpine-baselayout-data

accounts:
  groups:
    - groupname: nonroot
      gid: 65532
  users:
    - username: nonroot
      uid: 65532
      gid: 65532
  run-as: 65532

archs:
  - amd64
  - arm64
  - s390x
  - ppc64le

environment:
  PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
