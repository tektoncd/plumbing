apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: terraform-org-management
spec:
  params:
  - name: gitRepository
    description: The community git repository url
  - name: gitRevision
    description: The git revision
    default: main
  - name: terraformCommand
    description: Terraform command to run (plan or apply)
    # Start in shadow/plan-only mode for safe rollout.
    # Change to "apply" after validating plan output is clean.
    default: plan
  resourcetemplates:
  - apiVersion: tekton.dev/v1beta1
    kind: PipelineRun
    metadata:
      generateName: terraform-org-management-run-
      labels:
        tekton.dev/pipeline: terraform-org-management-sync
    spec:
      pipelineRef:
        name: terraform-org-management-sync
      params:
      - name: communityUrl
        value: $(tt.params.gitRepository)
      - name: communityRevision
        value: $(tt.params.gitRevision)
      - name: terraformCommand
        value: $(tt.params.terraformCommand)
      workspaces:
      - name: plumbing-workspace
        volumeClaimTemplate:
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 1Gi
      - name: community-workspace
        volumeClaimTemplate:
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 1Gi
      - name: github-oauth
        secret:
          secretName: peribolos-token-github
