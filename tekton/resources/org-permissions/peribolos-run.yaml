apiVersion: tekton.dev/v1beta1
kind: TaskRun
metadata:
  generateName: peribolos-run-
spec:
  taskRef:
    name: peribolos-sync
  params:
  - name: url
    value: https://github.com/tektoncd/community.git
  - name: revision
    value: main
  workspaces:
    - name: github-oauth
      secret:
        secretName: bot-token-github
    - name: source
      emptyDir: {}
