apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: terraform-org-management
spec:
  params:
  - name: terraformDir
    default: terraform/org-management/tektoncd
    description: Path to terraform configuration directory (relative to plumbing workspace)
  - name: orgConfigPath
    description: Absolute path to the org.yaml file in the community workspace
  - name: command
    default: apply
    description: Terraform command to run (plan or apply)
  workspaces:
  - name: plumbing
    description: The plumbing repository workspace (contains .tf files)
  - name: community
    description: The community repository workspace (contains org.yaml)
  - name: github-oauth
    mountPath: /etc/github
    description: GitHub token for terraform provider authentication
  steps:
  - name: terraform-init
    image: docker.io/hashicorp/terraform:1.7
    workingDir: $(workspaces.plumbing.path)/$(params.terraformDir)
    script: |
      #!/bin/sh
      set -ex
      terraform init -input=false -migrate-state
  - name: terraform-validate
    image: docker.io/hashicorp/terraform:1.7
    workingDir: $(workspaces.plumbing.path)/$(params.terraformDir)
    script: |
      #!/bin/sh
      set -ex
      terraform validate
  - name: terraform-plan
    image: docker.io/hashicorp/terraform:1.7
    workingDir: $(workspaces.plumbing.path)/$(params.terraformDir)
    script: |
      #!/bin/sh
      set -ex
      export GITHUB_TOKEN=$(cat /etc/github/bot-token)
      terraform plan \
        -var="org_config_path=$(params.orgConfigPath)" \
        -out=tfplan
  - name: terraform-execute
    image: docker.io/hashicorp/terraform:1.7
    workingDir: $(workspaces.plumbing.path)/$(params.terraformDir)
    script: |
      #!/bin/sh
      set -ex
      export GITHUB_TOKEN=$(cat /etc/github/bot-token)

      if [ "$(params.command)" = "apply" ]; then
        terraform apply -auto-approve tfplan
      elif [ "$(params.command)" = "plan" ]; then
        echo "Plan only mode - skipping apply"
      else
        echo "Unknown command: $(params.command)"
        exit 1
      fi
